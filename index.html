<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар Политех Авиа ✈️</title>
    <!-- Подключаем библиотеки с CDN -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0b132b; /* Цвет ночного неба */
            color: #c5c6c7;
            font-family: 'Courier New', monospace; /* Шрифт как на табло */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { 
            color: #39ff14; 
            text-shadow: 0 0 10px #39ff14;
            margin-bottom: 20px;
        }
        .radar-container {
            width: 90%;
            max-width: 1200px;
            height: 70vh;
            background: rgba(16, 32, 64, 0.8);
            border: 2px solid #39ff14;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
    </style>
</head>
<body>

    <h1>📡 РАДАР ДИСПЕТЧЕРСКОЙ ПОЛИТЕХ АВИА 📡</h1>
    <div class="radar-container">
        <canvas id="flightRadar"></canvas>
    </div>

    <script>
        const SHEET_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vQhlYU2RB6wpIzFS709BcVHZCEcRtL8ZIQjykgTiNOOBiynDuAfRoyo2t4F5aOE6-tQmVMhqlv2Lo8f/pub?gid=2078528736&single=true&output=csv');

        const teamColors = ['#ff0055', '#00ffaa', '#ffcc00', '#ff6600', '#aa00ff', '#00ccff', '#ff3399', '#33ff99'];

        Papa.parse(SHEET_URL, {
            download: true,
            header: false,
            complete: function(results) {
                const data = results.data;
                
                // Первая строка = названия раундов (пропускаем первую пустую ячейку)
                const rounds = data[0].slice(1).filter(r => r);
                
                // Первая колонка = названия команд (пропускаем первую строку с заголовками)
                const teamNames = data.slice(1).map(row => row[0]).filter(t => t);
                
                const datasets = [];
                
                // Для каждой команды создаём dataset
                teamNames.forEach((teamName, teamIndex) => {
                    const rowData = data[teamIndex + 1]; // +1 потому что первая строка - заголовки
                    
                    // Преобразуем данные: если FALSE — то null (линия прерывается)
                    const points = rowData.slice(1).map(p => {
                        // Проверяем на FALSE (может быть как строкой, так и булевым)
                        if (p === 'FALSE' || p === false || p === 'false') {
                            return null; // null = линия прерывается
                        }
                        // Если пустая ячейка или не число — тоже null
                        if (p === '' || p === null || p === undefined) {
                            return null;
                        }
                        // Иначе пытаемся распарсить число
                        const num = parseInt(p);
                        return isNaN(num) ? null : num;
                    });
                    
                    datasets.push({
                        label: teamName,
                        data: points,
                        borderColor: teamColors[teamIndex % teamColors.length],
                        backgroundColor: teamColors[teamIndex % teamColors.length],
                        borderWidth: 3,
                        tension: 0.3, // Плавные линии
                        pointStyle: '✈️',
                        pointRadius: 15,
                        pointHoverRadius: 20
                        // spanGaps не указан = false по умолчанию, линия прерывается на null
                    });
                });

                const ctx = document.getElementById('flightRadar').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: rounds, 
                        datasets: datasets 
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                labels: { 
                                    color: '#fff', 
                                    font: { size: 14 } 
                                } 
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        if (context.parsed.y === null) {
                                            return `${context.dataset.label}: раунд не проводился`;
                                        }
                                        return `${context.dataset.label}: ${context.parsed.y} миль`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { 
                                title: { display: true, text: 'ЭТАПЫ ПОЛЁТА', color: '#39ff14' },
                                ticks: { color: '#fff' },
                                grid: { color: 'rgba(255,255,255,0.1)' }
                            },
                            y: { 
                                title: { display: true, text: 'МИЛИ', color: '#39ff14' },
                                ticks: { color: '#fff' },
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                beginAtZero: true
                            }
                        }
                    }
                });
            },
            error: function(error) {
                console.error('Ошибка загрузки данных:', error);
                alert('Не удалось загрузить данные с таблицы. Проверьте консоль (F12) для деталей.');
            }
        });
    </script>
</body>
</html>
