<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар Политех Авиа ✈️</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #0b132b;
            color: #c5c6c7;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        h1 { 
            color: #39ff14; 
            text-shadow: 0 0 10px #39ff14;
            margin-bottom: 10px;
            text-align: center;
        }
        .status {
            color: #00ffaa;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #39ff14;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { opacity: 0.7; box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }
        .radar-container {
            width: 90%;
            max-width: 1200px;
            height: 70vh;
            background: rgba(16, 32, 64, 0.8);
            border: 2px solid #39ff14;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
    </style>
</head>
<body>

    <h1>📡 РАДАР ДИСПЕТЧЕРСКОЙ ПОЛИТЕХ АВИА 📡</h1>
    <div class="status">
        <div class="status-dot"></div>
        <span id="statusText">Подключение к радару...</span>
    </div>
    <div class="radar-container">
        <canvas id="flightRadar"></canvas>
    </div>

    <script>
        // ВСТАВЬ СЮДА СВОЙ URL от Apps Script (заканчивается на /exec)
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwIGfyTWa57OnwkoKUybErKuvIRpNJerQ929a4VdKcC08mBQ1frwJmbPH4JbbPeYwSvUg/exec';

        const teamColors = ['#ff0055', '#00ffaa', '#ffcc00', '#ff6600', '#aa00ff', '#00ccff', '#ff3399', '#33ff99'];
        
        let chartInstance = null;

        function loadRadarData() {
            const statusText = document.getElementById('statusText');
            statusText.textContent = 'Сканирование радаром...';

            Papa.parse(SHEET_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    console.log('Данные загружены:', results.data);
                    
                    const data = results.data;
                    
                    // Проверяем что данные не пустые
                    if (!data || data.length === 0) {
                        statusText.textContent = '⚠ Таблица пуста!';
                        return;
                    }
                    
                    // Первая строка = названия раундов (пропускаем первую пустую ячейку)
                    const rounds = data[0].slice(1).filter(r => r && r.toString().trim() !== '');
                    
                    // Первая колонка = названия команд (пропускаем первую строку с заголовками)
                    const teamNames = data.slice(1).map(row => row[0]).filter(t => t && t.toString().trim() !== '');
                    
                    console.log('Раунды:', rounds);
                    console.log('Команды:', teamNames);
                    
                    if (rounds.length === 0 || teamNames.length === 0) {
                        statusText.textContent = '⚠ Ошибка: нет данных о раундах или командах';
                        return;
                    }
                    
                    const datasets = [];
                    
                    teamNames.forEach((teamName, teamIndex) => {
                        const rowData = data[teamIndex + 1];
                        
                        if (!rowData) {
                            console.warn('Нет данных для команды:', teamName);
                            return;
                        }
                        
                        const points = rowData.slice(1).map(p => {
                            // Проверяем на FALSE
                            if (p === 'FALSE' || p === false || p === 'false' || p === 'ЛОЖЬ') {
                                return null;
                            }
                            // Если пустая ячейка
                            if (p === '' || p === null || p === undefined) {
                                return null;
                            }
                            // Пытаемся распарсить число
                            const num = parseInt(p);
                            return isNaN(num) ? null : num;
                        });
                        
                        datasets.push({
                            label: teamName,
                            data: points,
                            borderColor: teamColors[teamIndex % teamColors.length],
                            backgroundColor: teamColors[teamIndex % teamColors.length],
                            borderWidth: 3,
                            tension: 0.3,
                            pointStyle: '✈️',
                            pointRadius: 15,
                            pointHoverRadius: 20
                        });
                    });

                    // Удаляем старый график
                    if (chartInstance) {
                        chartInstance.destroy();
                    }

                    const ctx = document.getElementById('flightRadar').getContext('2d');
                    chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: { 
                            labels: rounds, 
                            datasets: datasets 
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { 
                                    labels: { 
                                        color: '#fff', 
                                        font: { size: 14 } 
                                    } 
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            if (context.parsed.y === null) {
                                                return `${context.dataset.label}: раунд не проводился`;
                                            }
                                            return `${context.dataset.label}: ${context.parsed.y} миль`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: { 
                                    title: { display: true, text: 'ЭТАПЫ ПОЛЁТА', color: '#39ff14' },
                                    ticks: { color: '#fff' },
                                    grid: { color: 'rgba(255,255,255,0.1)' }
                                },
                                y: { 
                                    title: { display: true, text: 'МИЛИ', color: '#39ff14' },
                                    ticks: { color: '#fff' },
                                    grid: { color: 'rgba(255,255,255,0.1)' },
                                    beginAtZero: true
                                }
                            }
                        }
                    });

                    const timeStr = new Date().toLocaleTimeString('ru-RU');
                    statusText.textContent = `✓ Радар активен | Обновлено: ${timeStr}`;
                },
                error: function(error) {
                    console.error('Ошибка загрузки данных:', error);
                    statusText.textContent = ' Ошибка связи с радаром. Проверьте консоль (F12)';
                }
            });
        }

        // Первый запуск
        loadRadarData();

        // Автообновление каждые 10 секунд
        setInterval(loadRadarData, 10000);
    </script>
</body>
</html>
